        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        const firebaseConfig = { apiKey: "AIzaSyC-LcCfcPYCYAQZ7n45YCe6tCY_jb-ygvI", authDomain: "sonicboom-shop.firebaseapp.com", projectId: "sonicboom-shop", storageBucket: "sonicboom-shop.firebasestorage.app", messagingSenderId: "976804831944", appId: "1:976804831944:web:6ede6a95196478bd49bbfd", measurementId: "G-3FEKWL0QXZ" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-email').value = user.email;
                document.getElementById('btn-logout').style.display = 'inline-block';
                renderPurchaseHistory(user);
            } else {
                alert('您尚未登入，請先登入！');
                window.location.href = 'login.html';
            }
        });

        function renderPurchaseHistory(user) {
            const historyList = document.getElementById('order-history-list');
            if (!historyList) return;

            const memberName = user.displayName || user.email.split('@')[0];
            const orders = JSON.parse(localStorage.getItem('dejeng_orders')) || [];
            
            // Filter orders for this user
            const userOrders = orders.filter(order => {
                if (!order.customer) return false;
                const custLower = order.customer.toLowerCase().trim();
                const memberLower = memberName.toLowerCase().trim();
                const emailLower = user.email.toLowerCase().trim();
                
                return custLower === memberLower || 
                       custLower === emailLower || 
                       custLower.includes(memberLower) ||
                       custLower.includes(emailLower.split('@')[0]);
            });

            // Sort orders by timestamp descending
            userOrders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            if (userOrders.length === 0) {
                historyList.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fa-solid fa-receipt text-muted mb-3" style="font-size: 3.5rem; opacity: 0.5;"></i>
                        <p class="text-muted mb-3">您目前尚無購買紀錄</p>
                        <a href="index.html" class="btn rounded-pill px-4 btn-sm" style="background-color: #FF8A00; color: #502314; border: 2px solid #502314; font-weight: 900;" style="font-weight: 500;">前去選購</a>
                    </div>
                `;
                return;
            }

            let html = '';
            userOrders.forEach((order, index) => {
                const dateStr = order.timestamp ? new Date(order.timestamp).toLocaleString('zh-TW', { hour12: false }) : '未知時間';
                const itemsHtml = order.items.map(item => {
                    const lastXIdx = item.lastIndexOf(' x');
                    let nameAndSpec = item;
                    let qty = 1;
                    if (lastXIdx !== -1) {
                        nameAndSpec = item.substring(0, lastXIdx);
                        qty = item.substring(lastXIdx + 2).trim();
                    }
                    return `
                        <li class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 py-2" style="background: transparent; font-size: 0.95rem; border-bottom: 1px dashed rgba(0,0,0,0.05) !important;">
                            <span class="text-secondary">
                                <i class="fa-solid fa-burger me-2" style="color: #FF8A00; font-size: 0.85rem;"></i>
                                <strong>${nameAndSpec}</strong>
                            </span>
                            <span class="badge bg-light text-dark rounded-pill border fw-bold px-2 py-1">x${qty}</span>
                        </li>
                    `;
                }).join('');

                const orderNum = userOrders.length - index;
                const ordDate = new Date(order.timestamp);
                const ordDateStr = ordDate.getFullYear() + 
                                   String(ordDate.getMonth() + 1).padStart(2, '0') + 
                                   String(ordDate.getDate()).padStart(2, '0') +
                                   String(ordDate.getHours()).padStart(2, '0') +
                                   String(ordDate.getMinutes()).padStart(2, '0') +
                                   String(ordDate.getSeconds()).padStart(2, '0');
                const serialNo = order.orderId || `ORD${ordDateStr}`;
                html += `
                    <div class="card border-0 shadow-sm mb-3 order-card" style="border-radius: 15px; overflow: hidden; background: #fafbfc; animation-delay: ${index * 0.08}s;">
                        <div class="card-body p-4">
                            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2 mb-3">
                                <div>
                                    <span class="text-muted small d-block mb-1"><i class="fa-regular fa-clock me-1"></i>${dateStr}</span>
                                    <span class="badge rounded-pill text-start" style="font-size: 0.8rem; background-color: #E8F8F5; color: #117A65; padding: 4px 10px; white-space: normal; display: inline-block; word-break: break-all;">訂單流水號：${serialNo}</span>
                                </div>
                                <div class="text-start text-sm-end mt-1 mt-sm-0">
                                    <span class="text-muted small d-block">消費金額</span>
                                    <span class="fw-bold text-primary" style="font-size: 1.25rem; white-space: nowrap;">NT$ ${order.total}</span>
                                </div>
                            </div>
                            <ul class="list-group list-group-flush mb-0 pt-2 border-top border-light-subtle">
                                ${itemsHtml}
                            </ul>
                            <div class="text-end mt-3 pt-2 border-top border-light-subtle">
                                <button class="btn btn-sm rounded-pill px-3" style="background-color: #FF8A00; color: #502314; border: 2px solid #502314; font-weight: 900; box-shadow: 2px 2px 0px #502314;" onclick="showOrderDetail('${serialNo}')">
                                    <i class="fa-solid fa-file-invoice me-1"></i>查看訂單明細
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            historyList.innerHTML = html;
        }

        };

        function parseOrderItem(itemStr) {
            let name = '';
            let code = '';
            let specs = '';
            let qty = 1;

            const lastX = itemStr.lastIndexOf(' x');
            let baseStr = itemStr;
            if (lastX !== -1) {
                baseStr = itemStr.substring(0, lastX).trim();
                qty = parseInt(itemStr.substring(lastX + 2).trim(), 10) || 1;
            }

            const parenMatch = baseStr.match(/\(([^)]+)\)/);
            if (parenMatch) {
                name = baseStr.replace(/\s*\([^)]+\)/g, '').trim();
                const inner = parenMatch[1];
                const parts = inner.split('/');
                code = parts[0];
                if (parts.length > 1) {
                    specs = parts.slice(1).join(' / ');
                }
            } else {
                name = baseStr;
            }

            return { name, code, specs, qty };
        }

        function findProductDetails(name) {
            for (const key in productsDB) {
                if (productsDB[key].name === name) {
                    return productsDB[key];
                }
            }
            return null;
        }

        window.showOrderDetail = function(orderId) {
            const orders = JSON.parse(localStorage.getItem('dejeng_orders')) || [];
            const order = orders.find(o => {
                if (o.orderId === orderId) return true;
                const ordDate = new Date(o.timestamp);
                const ordDateStr = ordDate.getFullYear() + 
                                   String(ordDate.getMonth() + 1).padStart(2, '0') + 
                                   String(ordDate.getDate()).padStart(2, '0') +
                                   String(ordDate.getHours()).padStart(2, '0') +
                                   String(ordDate.getMinutes()).padStart(2, '0') +
                                   String(ordDate.getSeconds()).padStart(2, '0');
                const fallbackId = `ORD${ordDateStr}`;
                return fallbackId === orderId;
            });

            if (!order) {
                alert('找不到該筆訂單明細！');
                return;
            }

            document.getElementById('detail-order-id').innerText = order.orderId || orderId;
            document.getElementById('detail-order-time').innerText = order.timestamp ? new Date(order.timestamp).toLocaleString('zh-TW', { hour12: false }) : '未知時間';
            document.getElementById('detail-payment-total').innerText = `NT$ ${order.total.toLocaleString()}`;
            document.getElementById('detail-payment-method').innerText = order.paymentMethod || '線上付款';
            
            const pmBadge = document.getElementById('detail-payment-method');
            if (order.paymentMethod === '貨到付款') {
                pmBadge.className = 'badge text-white'; pmBadge.style.backgroundColor = '#D62300';
            } else if (order.paymentMethod === 'Line Pay') {
                pmBadge.className = 'badge text-white';
                pmBadge.style.backgroundColor = '#06c755';
            } else {
                pmBadge.className = 'badge text-white'; pmBadge.style.backgroundColor = '#FF8A00';
                pmBadge.style.backgroundColor = '';
            }

            const statusBadge = document.getElementById('detail-order-status');
            const isCompleted = order.status === 'completed';
            statusBadge.innerText = isCompleted ? '已出餐' : '準備中';
            statusBadge.className = 'badge text-white'; statusBadge.style.backgroundColor = isCompleted ? '#27ae60' : '#D62300';

            const tbody = document.getElementById('detail-items-body');
            let itemsHtml = '';
            const statusSettings = JSON.parse(localStorage.getItem('dejeng_product_settings')) || {};

            order.items.forEach(itemStr => {
                const parsed = parseOrderItem(itemStr);
                const p = findProductDetails(parsed.name);
                
                const img = p ? p.img : 'image/logo.png';
                let unitPrice = p ? p.price : 0;
                if (p) {
                    const promoPrice = statusSettings[p.name]?.promoPrice;
                    if (promoPrice && promoPrice < p.price) {
                        unitPrice = promoPrice;
                    }
                }
                
                const subtotal = unitPrice * parsed.qty;
                
                let specSpan = '';
                if (parsed.specs) {
                    specSpan = `<span class="badge text-white ms-1" style="font-size:0.75rem; background-color:#502314 !important; border: 1.5px solid #FF8A00 !important;">${parsed.specs}</span>`;
                }

                itemsHtml += `
                    <tr>
                        <td class="text-start ps-3">
                            <div class="fw-bold text-dark fs-6">${parsed.name} ${specSpan}</div>
                            ${parsed.code ? `<div class="text-muted small mt-1">${parsed.code}</div>` : ''}
                        </td>
                        <td>
                            <img src="${img}" alt="${parsed.name}" class="details-img">
                        </td>
                        <td class="fw-bold text-primary">$${unitPrice}</td>
                        <td class="fw-bold">${parsed.qty}</td>
                        <td class="fw-bold text-danger">$${subtotal.toLocaleString()}</td>
                    </tr>
                `;
            });

            let itemsSum = 0;
            order.items.forEach(itemStr => {
                const parsed = parseOrderItem(itemStr);
                const p = findProductDetails(parsed.name);
                let unitPrice = p ? p.price : 0;
                if (p) {
                    const promoPrice = statusSettings[p.name]?.promoPrice;
                    if (promoPrice && promoPrice < p.price) {
                        unitPrice = promoPrice;
                    }
                }
                itemsSum += unitPrice * parsed.qty;
            });

            if (order.discount > 0 || itemsSum !== order.total) {
                const discountVal = order.discount || (itemsSum - order.total);
                if (discountVal > 0) {
                    itemsHtml += `
                        <tr class="table-light">
                            <td colspan="4" class="text-end fw-bold">折扣</td>
                            <td class="fw-bold text-success">-$${discountVal.toLocaleString()}</td>
                        </tr>
                    `;
                }
            }

            itemsHtml += `
                <tr class="table-light">
                    <td colspan="4" class="text-end fw-bold fs-6">付款總額</td>
                    <td class="fw-bold text-danger fs-6">$${order.total.toLocaleString()}</td>
                </tr>
            `;

            tbody.innerHTML = itemsHtml;

            document.getElementById('order-history-view').style.display = 'none';
            document.getElementById('order-detail-view').style.display = 'block';
        };

        window.hideOrderDetail = function() {
            document.getElementById('order-detail-view').style.display = 'none';
            document.getElementById('order-history-view').style.display = 'block';
        };

        document.getElementById('btn-logout').addEventListener('click', () => {
            if(confirm("確定要登出嗎？")) { 
                localStorage.removeItem('dejeng_cart'); 
                signOut(auth).then(() => { window.location.href = 'index.html'; }); 
            }
        });

        document.getElementById('btn-update-pwd').addEventListener('click', () => {
            const user = auth.currentUser;
            const newPwd = document.getElementById('new-password').value;
            
            if(!newPwd || newPwd.length < 6) {
                alert('密碼不得為空，且至少需要 6 個字元。');
                return;
            }

            if(user) {
                const btn = document.getElementById('btn-update-pwd');
                btn.innerText = '修改中...';
                btn.disabled = true;

                updatePassword(user, newPwd).then(() => {
                    alert('密碼修改成功！請重新登入。');
                    signOut(auth).then(() => { window.location.href = 'login.html'; });
                }).catch((error) => {
                    console.error(error);
                    if(error.code === 'auth/requires-recent-login') {
                        alert('基於安全考量，修改密碼需要重新驗證身分，請先登出再重新登入後修改。');
                    } else {
                        alert('修改失敗，請稍後再試。');
                    }
                    btn.innerText = '確認修改密碼';
                    btn.disabled = false;
                });
            }
        });
    </script>
